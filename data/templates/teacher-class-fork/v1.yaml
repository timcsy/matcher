schema_version: '1.0'
id: teacher-class-fork
name: 教師-班級配對
description: 依專業與班級需要科目配對任課教師
attributes:
  roles:
  - key: name
    type: str
    required: true
    description: 老師姓名
  - key: speciality
    type: str
    required: true
    description: 老師專業科目
  - key: seniority
    type: int
    required: true
    description: 年資（年）
  targets:
  - key: name
    type: str
    required: true
    description: 班級名稱
  - key: required_subjects
    type: list_str
    required: true
    description: 班級需要的科目清單
  - key: feature
    type: str
    required: true
    description: 班級特色
rules: []

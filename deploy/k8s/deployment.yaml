apiVersion: apps/v1
kind: Deployment
metadata:
  name: matcher
  labels:
    app: matcher
spec:
  replicas: 1
  strategy:
    type: Recreate           # RWO PVC 不可同時掛兩 pod，故用 Recreate（非 RollingUpdate）
  selector:
    matchLabels:
      app: matcher
  template:
    metadata:
      labels:
        app: matcher
    spec:
      containers:
        - name: matcher
          # 由 build 帶入具體 sha tag（見 quickstart / tasks T014）；committed 預設為 latest
          image: ghcr.io/timcsy/matcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
          envFrom:
            - secretRef:
                name: matcher-secrets   # 由 `kubectl create secret --from-env-file=.env` 建立
          volumeMounts:
            - name: data
              mountPath: /app/data       # 配對紀錄 / 自訂範本落在 PVC
          readinessProbe:
            httpGet:
              path: /login
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 8765
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matcher-data

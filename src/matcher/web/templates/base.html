<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}matcher{% endblock %} — matcher</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>[x-cloak] { display: none !important; }</style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="/">matcher</a></h1>
    <nav>
      <a href="/templates">範本</a>
      <a href="/match/new">新增一次配對</a>
      <a href="/matches">過去紀錄</a>
      {% set _email = current_email(request) %}
      {% if _email %}
      <span style="margin-left:auto; color:#ccc; font-size:0.85em">{{ _email }}</span>
      <form method="post" action="/logout" style="display:inline; margin:0">
        <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
        <button type="submit" style="background:none; border:none; color:#ccc; cursor:pointer; text-decoration:underline; font-size:0.85em">登出</button>
      </form>
      {% else %}
      <a href="/login" style="margin-left:auto">登入</a>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer><small>matcher — 公平公開的參與者 / 對象配對工具</small></footer>
</body>
</html>
